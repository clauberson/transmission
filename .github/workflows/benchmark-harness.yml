name: Benchmark Harness

on:
  workflow_dispatch:
    inputs:
      mode:
        description: smoke or full
        required: true
        default: smoke
        type: choice
        options: [smoke, full]
  pull_request:
    branches: [main]
    paths:
      - 'utils/perf_benchmark_harness.py'
      - 'utils/tc_netem_profiles.py'
      - 'tests/utils/test_tc_netem_profiles.py'
      - 'Makefile'
      - '.github/workflows/benchmark-harness.yml'
      - 'docs/Benchmark-Harness.md'
      - 'utils/perf_compare_baseline.py'
      - 'utils/perf_dashboard.py'
      - 'utils/update_perf_baseline.py'
      - 'perf-baseline/**'

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke benchmark entrypoint
        if: ${{ github.event_name == 'pull_request' || inputs.mode == 'smoke' }}
        run: make benchmark-smoke

      - name: Run full benchmark entrypoint
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full' }}
        run: make benchmark-full

      - name: Compare with versioned baseline
        run: ./utils/perf_compare_baseline.py --summary artifacts/summary.json --baseline-root perf-baseline --output-json artifacts/baseline-comparison.json --output-md artifacts/baseline-comparison.md

      - name: Build performance dashboard
        run: ./utils/perf_dashboard.py --artifacts-root artifacts --comparison artifacts/baseline-comparison.json --output-json artifacts/perf-dashboard/data.json --output-html artifacts/perf-dashboard/index.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: artifacts
